# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "91907a300341dc386f277329f029d6dd"
name = "PromoLoom"
application_url = "https://promoloom.onkra.online"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  uri = "/api/webhooks"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  # NOTE: app-specific topic subscriptions (e.g. app/uninstalled,
  # app_subscriptions/update) are not allowed in this TOML while
  # use_legacy_install_flow = true. The handlers exist in web/gdpr.js +
  # web/index.js as defense-in-depth — if we move to managed install
  # later we can declare them here and they'll start firing.

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = true

[auth]
redirect_urls = [ "https://promoloom.onkra.online/api/auth/callback" ]

[app_proxy]
url = "https://promoloom.onkra.online/api/scroll-to-top"
subpath = "scroll-to-top"
prefix = "apps"
